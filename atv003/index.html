<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda de Ingresso</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4>Cadastro de Compra de Ingresso</h4>
            </div>

            <div class="card-body">
                <form id="formIngresso">

                    <h5 class="mb-3">Dados do Comprador</h5>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="nome" placeholder="Nome completo" required>
                                <label for="nome">Nome completo</label>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="email" class="form-control" id="email" placeholder="Email" required>
                                <label for="email">Email</label>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Telefone</label>
                            <div class="input-group">
                                <span class="input-group-text">+55</span>
                                <input type="tel" class="form-control" id="telefone" placeholder="(11) 99999-9999">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="cpf" placeholder="CPF">
                                <label for="cpf">CPF</label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="cor" class="form-label">Escolha a cor da camiseta (brinde)</label>
                        <input type="color" class="form-control form-control-color" id="cor" value="#0d6efd">
                    </div>

                    <div class="mb-3">
                        <div class="form-floating">
                            <select class="form-select" id="setor" required>
                                <option selected disabled value="">Selecione um setor</option>
                                <option>Pista</option>
                                <option>Pista Premium</option>
                                <option>Camarote</option>
                                <option>Arquibancada Superior</option>
                                <option>Arquibancada Inferior</option>
                            </select>
                            <label for="setor">Setor da arquibancada</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="foto" class="form-label">Foto para o crachá</label>
                        <input type="file" class="form-control" id="foto" accept="image/*">
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <button type="reset" class="btn btn-secondary">Limpar</button>
                        <button type="submit" class="btn btn-success">Salvar</button>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
